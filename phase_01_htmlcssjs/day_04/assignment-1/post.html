        <h3>King Khan</h3>
        <div class="btn">
        <button id="LikeBtn">👍</button>
        <h3>Likes: <span id="LikeCount">0</span></h3>
        </div>
        <div class="btn">
        <button id="dislikeBtn">👎</button>
        <h3>Dislikes: <span id="DislikeCount">0</span></h3>
        </div>
    </div>

<script>
    var lbtn=document.getElementById("LikeBtn") //select that element with getelementbyid
    var count=0
    lbtn.addEventListener("click",function(){
        
        count+=1
        var likes=document.getElementById("LikeCount")
        likes.innerText=count
        likes.style.color="red"

    })

    var count1=0
    var dlbtn=document.getElementById("dislikeBtn")
    dlbtn.addEventListener("click",function(){
        count1+=1
        var dislikes=document.getElementById("DislikeCount")
        dislikes.innerText=count1
    })


</script>
